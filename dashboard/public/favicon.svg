<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#1E293B"/>
  <!-- Rising sun / dawn arc — light breaking through -->
  <circle cx="16" cy="22" r="7" fill="none" stroke="#0D9488" stroke-width="2.5"/>
  <!-- Horizon line -->
  <line x1="4" y1="22" x2="28" y2="22" stroke="#1E293B" stroke-width="3"/>
  <!-- Rays of light above horizon -->
  <line x1="16" y1="6" x2="16" y2="11" stroke="#0D9488" stroke-width="2" stroke-linecap="round"/>
  <line x1="9" y1="9" x2="11.5" y2="12.5" stroke="#0D9488" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="23" y1="9" x2="20.5" y2="12.5" stroke="#0D9488" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="6" y1="15" x2="9" y2="16.5" stroke="#0D9488" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="26" y1="15" x2="23" y2="16.5" stroke="#0D9488" stroke-width="1.5" stroke-linecap="round"/>
</svg>
